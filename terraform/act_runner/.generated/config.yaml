# Job-контейнеры подключаются к gitea-network — сервисы доступны по DNS-именам контейнеров.
log:
  level: info

runner:
  file: .runner
  capacity: 1

container:
  network: gitea-network
  valid_volumes:
    - /var/run/docker.sock
  options: --mount type=bind,source=C:/Users/KRT/Desktop/environment/terraform/.generated/kubeconfig-local-runner,target=/kube/config,readonly
